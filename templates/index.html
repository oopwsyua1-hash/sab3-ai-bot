<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0b2e13; color: white; text-align: center; font-family: sans-serif; }
        .timer { font-size: 50px; color: yellow; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; }
        .team-btn { background: #1a5a28; padding: 15px; border-radius: 10px; border: 1px solid #555; cursor: pointer; }
        .coin-btn { background: #004d40; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2 id="timer">31s</h2>
    <div class="grid" id="teams">
        <button class="team-btn" onclick="bet('Juve', 4)">Juve<br>x4</button>
        <button class="team-btn" onclick="bet('Real', 40)">Real<br>x40</button>
        <button class="team-btn" onclick="bet('Barca', 40)">Barca<br>x40</button>
        </div>
    <div id="result" style="margin-top:20px; font-size: 20px;"></div>

    <script>
        function bet(team, multiplier) {
            alert("تم اختيار " + team + " معامل " + multiplier);
            // إرسال الرهان للسيرفر (POST)
        }
        
        setInterval(() => {
            fetch('/game_data').then(res => res.json()).then(data => {
                document.getElementById('timer').innerText = data.timer + "s";
                if(data.last_result) document.getElementById('result').innerText = "فاز الفريق: " + data.last_result;
            });
        }, 1000);
    </script>
</body>
</html>
