<script>
let selectedTeam = null;
let timer = 31;

document.querySelectorAll('.team').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.team').forEach(x => x.classList.remove('selected'));
    t.classList.add('selected');
    selectedTeam = t.querySelector('img').alt || 'team';
  }
});

document.querySelectorAll('.bet-btn').forEach(btn => {
  btn.onclick = async () => {
    if(!selectedTeam) return alert('اختار فريق أول');
    let amount = parseInt(btn.textContent.replace(/\D/g,''));

    let res = await fetch('/api/bet', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({team: selectedTeam, amount})
    });
    let data = await res.json();

    if(data.error) alert(data.error);
    else {
      alert(data.win? `ربحت! x${data.multiplier}` : 'خسرت');
      document.querySelector('.footer div:last-child').textContent = `كمية الكرستال: ${data.crystals} 💎`;
    }
  }
});

setInterval(() => {
  timer--;
  if(timer < 0) timer = 31;
  document.getElementById('timer').textContent = timer + 's';
}, 1000);

fetch('/api/crystals').then(r=>r.json()).then(d=>{
  document.querySelector('.footer div:last-child').textContent = `كمية الكرستال: ${d.crystals} 💎`;
});
</script>
