<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0b2e13; color: white; text-align: center; font-family: sans-serif; }
        .timer-box { font-size: 50px; font-weight: bold; color: #ffeb3b; margin: 20px 0; }
        
        /* تصميم الأندية */
        .teams-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; }
        .team-btn { background: #1a5a28; padding: 15px; border-radius: 10px; border: 2px solid #2e7d32; cursor: pointer; color: white; }
        
        /* تصميم الكونزات */
        .coins-bar { display: flex; justify-content: center; gap: 10px; padding: 20px; }
        .coin-btn { background: #4a148c; padding: 15px; border-radius: 5px; cursor: pointer; border: none; color: white; }
    </style>
</head>
<body>

<div class="timer-box" id="timer">31s</div>

<div class="teams-grid">
    <button class="team-btn" onclick="bet('Real')">ريال مدريد<br>x40</button>
    <button class="team-btn" onclick="bet('Barca')">برشلونة<br>x40</button>
    <button class="team-btn" onclick="bet('PSG')">باريس<br>x12</button>
    <button class="team-btn" onclick="bet('Liverpool')">ليفربول<br>x12</button>
    <button class="team-btn" onclick="bet('Milan')">ميلان<br>x6</button>
    <button class="team-btn" onclick="bet('Bayern')">بايرن<br>x6</button>
    <button class="team-btn" onclick="bet('Juve')">يوفنتوس<br>x4</button>
    <button class="team-btn" onclick="bet('ManU')">مان يونايتد<br>x4</button>
</div>

<div class="coins-bar">
    <button class="coin-btn" onclick="select(10000)">10000</button>
    <button class="coin-btn" onclick="select(50000)">50000</button>
    <button class="coin-btn" onclick="select(100000)">100000</button>
</div>

<script>
    let betAmount = 0;
    function select(amount) { betAmount = amount; alert("تم اختيار رهان: " + amount); }
    
    function bet(team) {
        if(betAmount === 0) { alert("اختر قيمة الرهان أولاً"); return; }
        alert("تم الرهان بـ " + betAmount + " على " + team);
    }

    // تحديث التايمر من السيرفر
    setInterval(() => {
        fetch('/game_data').then(res => res.json()).then(data => {
            document.getElementById('timer').innerText = data.timer + "s";
        });
    }, 1000);
</script>

</body>
</html>
