<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            background: linear-gradient(to bottom, #063a1a, #0b2e13); 
            color: white; font-family: sans-serif; text-align: center; margin: 0;
        }
        .header { padding: 10px; font-size: 18px; }
        .timer-box { font-size: 60px; font-weight: bold; color: #ffeb3b; margin: 20px 0; }
        
        /* توزيع الفرق بشكل دائري بسيط */
        .teams-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; }
        .team-btn { background: #1a5a28; border: 2px solid #2e7d32; padding: 10px; border-radius: 10px; cursor: pointer; }
        
        /* شريط الكونزات */
        .coins-bar { display: flex; justify-content: center; gap: 10px; padding: 20px; overflow-x: auto; }
        .coin-btn { background: #2e7d32; padding: 15px; border-radius: 5px; cursor: pointer; border: none; color: white; }
    </style>
</head>
<body>

<div class="header">الجولة 1583 لليوم</div>
<div class="timer-box" id="timer">31s</div>

<div class="teams-grid" id="teams">
    <button class="team-btn" onclick="bet('Juve')">Juve<br>x4</button>
    <button class="team-btn" onclick="bet('Real')">Real<br>x40</button>
    <button class="team-btn" onclick="bet('Barca')">Barca<br>x40</button>
</div>

<div class="coins-bar">
    <button class="coin-btn" onclick="selectCoin(10000)">10000</button>
    <button class="coin-btn" onclick="selectCoin(50000)">50000</button>
    <button class="coin-btn" onclick="selectCoin(100000)">100000</button>
</div>

<script>
    function updateTimer() {
        fetch('/game_data')
            .then(res => res.json())
            .then(data => {
                document.getElementById('timer').innerText = data.timer + "s";
            });
    }
    setInterval(updateTimer, 1000);
</script>

</body>
</html>
