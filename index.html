<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة الخال قصي | CYBER COMMAND OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-gold: #ffd700; --deep-black: #050505; --cyber-green: #00ff41; --glass: rgba(255,255,255,0.05); }
        body { background: var(--deep-black); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding-bottom: 70px; }
        
        /* الهيدر الاحترافي */
        .header { background: #111; padding: 20px; border-bottom: 2px solid var(--cyber-green); text-align: center; }
        .header h1 { color: var(--main-gold); margin: 0; font-size: 1.5rem; text-transform: uppercase; }
        .status-bar { font-size: 0.7rem; color: var(--cyber-green); margin-top: 5px; }

        /* منطقة التحكم */
        .control-panel { padding: 15px; }
        .module-card { background: var(--glass); border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 15px; }
        .module-card:hover { border-color: var(--main-gold); transform: scale(1.02); }
        .module-icon { font-size: 1.8rem; color: var(--main-gold); }
        
        /* نافذة المعالجة */
        #processOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; padding: 20px; }
        .terminal-box { background: #000; border: 1px solid var(--cyber-green); height: 80%; overflow-y: auto; padding: 15px; font-family: monospace; color: var(--cyber-green); }
        
        /* القائمة السفلية */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-user-secret"></i> منظومة الخال قصي VIP</h1>
        <div class="status-bar" id="liveStatus">نظام الحماية: مفعل | حالة السيرفر: متصل</div>
    </div>

    <div class="control-panel">
        <div class="module-card" onclick="runProcess('فحص الثغرات البرمجية')">
            <div class="module-icon"><i class="fa-solid fa-bug"></i></div>
            <div>
                <h3>تحليل واكتشاف الثغرات</h3>
                <p style="font-size: 0.8rem; opacity: 0.7;">مسح شامل لثغرات النظام المتقدمة</p>
            </div>
        </div>

        <div class="module-card" onclick="runProcess('تشفير البيانات')">
            <div class="module-icon"><i class="fa-solid fa-lock"></i></div>
            <div>
                <h3>فك وتوليد التشفير</h3>
                <p style="font-size: 0.8rem; opacity: 0.7;">معالجة خوارزميات AES و SHA</p>
            </div>
        </div>

        <div class="module-card" onclick="runProcess('التحكم عن بعد')">
            <div class="module-icon"><i class="fa-solid fa-terminal"></i></div>
            <div>
                <h3>وحدة التحكم العكسي</h3>
                <p style="font-size: 0.8rem; opacity: 0.7;">إنشاء قناة اتصال مشفرة مع الهدف</p>
            </div>
        </div>
    </div>

    <div id="processOverlay">
        <h2 style="color: var(--main-gold);">جاري تنفيذ العملية...</h2>
        <div class="terminal-box" id="termOutput"></div>
        <button onclick="document.getElementById('processOverlay').style.display='none'" style="margin-top:10px; width:100%; padding:10px; background:red; border:none; color:white;">إنهاء العملية</button>
    </div>

    <div class="bottom-nav">
        <i class="fa-solid fa-house"></i>
        <i class="fa-solid fa-shield-halved"></i>
        <i class="fa-solid fa-gear"></i>
    </div>

    <script>
        function runProcess(name) {
            const overlay = document.getElementById('processOverlay');
            const term = document.getElementById('termOutput');
            overlay.style.display = 'block';
            term.innerHTML = `> بدأت عملية: ${name}<br>> جاري الاتصال بالخادم الرئيسي...<br>`;
            
            let count = 0;
            let interval = setInterval(() => {
                count++;
                term.innerHTML += `> [${count}%] جاري معالجة البيانات وتحليل الحزم...<br>`;
                if(count >= 100) {
                    clearInterval(interval);
                    term.innerHTML += `<span style="color:white;">> تم الإنجاز بنجاح يا خال!</span>`;
                }
                term.scrollTop = term.scrollHeight;
            }, 100);
        }
    </script>
</body>
</html>
